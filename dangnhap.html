<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIKA - Đăng nhập</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121212] text-white min-h-screen flex items-center justify-center font-sans p-4 relative">

  <a href="index.html" class="absolute top-6 left-6 flex items-center text-gray-400 hover:text-white transition-colors group">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
    Quay lại
  </a>

  <div class="w-full max-w-md bg-[#1a1a1a] rounded-2xl shadow-2xl border border-zinc-800/50 p-8 sm:p-10">
    
    <div class="text-center mb-8">
      <a href="index.html" class="inline-block mb-4">
        <span class="text-amber-500 font-bold text-4xl tracking-wider">VIKA</span>
      </a>
      <h1 class="text-2xl font-bold text-zinc-100 mb-2">Chào mừng trở lại!</h1>
      <p class="text-gray-400 text-sm">Đăng nhập để tiếp tục lộ trình tập luyện của bạn</p>
    </div>

    <form action="#" method="POST" class="space-y-5">
      
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-1.5">Email</label>
        <input type="email" id="email" placeholder="Nhập địa chỉ email" required
               class="w-full bg-[#242526] border border-zinc-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-colors">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">Mật khẩu</label>
        <div class="relative">
          <input type="password" id="password" placeholder="Nhập mật khẩu" required
                 class="w-full bg-[#242526] border border-zinc-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-colors">
          <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center text-gray-400 hover:text-gray-300 cursor-pointer">
          <input type="checkbox" class="rounded bg-[#242526] border-zinc-700 text-amber-500 focus:ring-amber-500 focus:ring-offset-zinc-900 w-4 h-4 mr-2">
          Ghi nhớ tài khoản
        </label>
        <a href="#" class="text-amber-500 hover:text-amber-400 font-medium transition-colors">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="w-full mt-6 px-8 py-3.5 bg-gradient-to-r from-amber-500 to-orange-600 text-white font-bold rounded-lg shadow-lg hover:brightness-110 transition-all uppercase tracking-wider text-sm">
        Đăng nhập
      </button>

    </form>

    <div class="mt-8 flex items-center justify-center space-x-3">
      <div class="h-px bg-zinc-700 flex-1"></div>
      <span class="text-gray-500 text-sm">Hoặc tiếp tục với</span>
      <div class="h-px bg-zinc-700 flex-1"></div>
    </div>

    <div class="mt-6 grid grid-cols-2 gap-4">
      <button class="flex items-center justify-center px-4 py-2.5 border border-zinc-700 rounded-lg hover:bg-zinc-800 transition-colors">
        <svg class="h-5 w-5 mr-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span class="text-sm font-medium text-gray-300">Google</span>
      </button>
      
      <button class="flex items-center justify-center px-4 py-2.5 border border-zinc-700 rounded-lg hover:bg-zinc-800 transition-colors">
        <svg class="h-5 w-5 mr-2 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        <span class="text-sm font-medium text-gray-300">Facebook</span>
      </button>
    </div>

    <div class="mt-8 text-center text-sm text-gray-400">
      Chưa có tài khoản? 
      <a href="#" class="text-amber-500 hover:text-amber-400 font-bold transition-colors">Đăng ký ngay</a>
    </div>

  </div>

</body>
</html>
